# z2k webpanel lighttpd config.
#
# Installed at /opt/zapret2/webpanel/lighttpd.conf.
# Values @PORT@, @BIND@, @WWW_DIR@ are substituted by install.sh before
# the file is written to its final location.

server.document-root        = "@WWW_DIR@"
server.port                 = @PORT@
server.bind                 = "@BIND@"
server.pid-file             = "/var/run/z2k-webpanel.pid"
server.errorlog             = "/tmp/z2k-webpanel-error.log"
server.tag                  = "z2k-panel"

server.modules = (
    "mod_indexfile",
    "mod_cgi",
    "mod_dirlisting",
)

index-file.names = ( "index.html" )

# Disable directory listing (the root cause of the bug with the old panel —
# empty dir served as a file listing). Prefer a 404 instead.
dir-listing.activate = "disable"
dir-listing.hide-dotfiles = "enable"

mimetype.assign = (
    ".html" => "text/html; charset=utf-8",
    ".css"  => "text/css; charset=utf-8",
    ".js"   => "application/javascript; charset=utf-8",
    ".json" => "application/json; charset=utf-8",
    ".svg"  => "image/svg+xml",
    ".png"  => "image/png",
    ".ico"  => "image/x-icon",
    ".txt"  => "text/plain; charset=utf-8",
    ""      => "application/octet-stream",
)

# CGI: anything under /cgi-bin/ executes as sh.
# Our /cgi-bin/api is a symlink to /opt/zapret2/webpanel/cgi/api.sh.
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign = ( "" => "/bin/sh" )
}

# No auth: panel is LAN-only by design, trusts everything on the local
# network. Same trust level as the Keenetic web UI at 192.168.1.1.
# CSRF protection is still enforced at the CGI layer via same-origin
# Referer check for all POST requests.
