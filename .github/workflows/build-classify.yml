name: build-classify

# Builds z2k-classify binary for all supported Keenetic architectures.
# Triggered on push to enhanced (so we have ready-to-install binaries
# once the code merges), and on tags for release packaging.

on:
  workflow_dispatch:
  push:
    branches:
      - z2k-enhanced
      - z2k-refactor-wip
    paths:
      - 'z2k-classify/**'
      - '.github/workflows/build-classify.yml'
  pull_request:
    paths:
      - 'z2k-classify/**'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            tool: aarch64-unknown-linux-musl
          - arch: arm
            tool: armv6-unknown-linux-musleabi
          - arch: mips64
            tool: mips64-unknown-linux-musl
          - arch: mipsel
            tool: mipsel-unknown-linux-muslsf
          - arch: mips
            tool: mips-unknown-linux-muslsf
          - arch: ppc
            tool: powerpc-unknown-linux-musl
          - arch: x86
            tool: i586-unknown-linux-musl
          - arch: x86_64
            tool: x86_64-unknown-linux-musl
          - arch: riscv64
            tool: riscv64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain
        env:
          TOOL: ${{ matrix.tool }}
        run: |
          URL=https://github.com/bol-van/musl-cross/releases/download/latest/$TOOL.tar.xz
          mkdir -p $HOME/tools
          wget -qO- $URL | tar -C $HOME/tools -xJ
          echo "$HOME/tools/$TOOL/bin" >> $GITHUB_PATH

      - name: Build
        working-directory: z2k-classify
        env:
          TARGET: ${{ matrix.tool }}
        run: |
          make clean
          make CC=$TARGET-gcc STRIP=$TARGET-strip
          ls -la z2k-classify
          file z2k-classify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: z2k-classify-${{ matrix.arch }}
          path: z2k-classify/z2k-classify
          retention-days: 30

      - name: Rename for release attach
        if: github.ref == 'refs/heads/z2k-enhanced'
        run: cp z2k-classify/z2k-classify z2k-classify/z2k-classify-${{ matrix.arch }}

      - name: Stage release artifact
        if: github.ref == 'refs/heads/z2k-enhanced'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: z2k-classify/z2k-classify-${{ matrix.arch }}
          retention-days: 1

  release:
    name: Update rolling release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/z2k-enhanced'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all per-arch binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: ./binaries
          merge-multiple: true

      - name: List staged artifacts
        run: ls -la binaries/

      - name: Update rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=z2k-classify-rolling
          # Delete the old release (if any) — gh handles missing gracefully
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          # Create fresh rolling release with all per-arch binaries
          gh release create "$TAG" \
            --title "z2k-classify rolling (auto-built from z2k-enhanced)" \
            --notes "Automatic per-arch builds from z2k-enhanced HEAD ($(git rev-parse --short HEAD)).
Pull the right binary for your router via lib/install.sh:step_install_z2k_classify.
Built by .github/workflows/build-classify.yml — overwritten on every push to z2k-enhanced." \
            --target z2k-enhanced \
            binaries/z2k-classify-*
